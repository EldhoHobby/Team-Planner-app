# Self-hosted Team Planner — three services on a private network.
# Only the proxy is published to the host; app and db stay internal.

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-planner.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

  # One-shot: syncs the DB schema, then exits. Runs before app starts.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgres://planner:${DB_PASSWORD}@db:5432/planner
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://planner:${DB_PASSWORD}@db:5432/planner
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL:-https://planner.localhost}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@planner.local}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      SEED_DEFAULT_TECHNICIANS: ${SEED_DEFAULT_TECHNICIANS:-false}
      TIMESHEET_TEMPLATE_PATH: ${TIMESHEET_TEMPLATE_PATH:-/app/timesheet-template/Time_Sheet_Template.xlsm}
      # ── Email → task ingest (Gmail via IMAP; blank = feature off) ──
      EMAIL_INGEST_ENABLED: ${EMAIL_INGEST_ENABLED:-false}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      EMAIL_POLL_SECONDS: ${EMAIL_POLL_SECONDS:-120}
      # ── Local AI email summarizer (Ollama; blank/false = feature off) ──
      EMAIL_AI_ENABLED: ${EMAIL_AI_ENABLED:-false}
      EMAIL_AI_MODEL: ${EMAIL_AI_MODEL:-qwen2.5:3b-instruct}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads          # task attachments, persisted on the host
      - ./timesheet-template:/app/timesheet-template:ro   # QEI timesheet template (host-managed)
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - web          # reachable by proxy
      - internal     # reaches db
    # No host ports — only the proxy talks to it.

  # Local LLM runtime for the email→task summarizer. Internal network only;
  # the model loads on first request and unloads after idling, so the idle
  # footprint is small even when EMAIL_AI_ENABLED=false.
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - internal
    # No host ports — only the app talks to it.

  # One-shot: downloads the summarizer model (only when the feature is on),
  # then exits. The app does NOT wait for it — AI is optional and lazy.
  ollama-init:
    image: ollama/ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      EMAIL_AI_ENABLED: ${EMAIL_AI_ENABLED:-false}
      EMAIL_AI_MODEL: ${EMAIL_AI_MODEL:-qwen2.5:3b-instruct}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "$${EMAIL_AI_ENABLED}" != "true" ]; then
          echo "EMAIL_AI_ENABLED is not true — skipping model download."
          exit 0
        fi
        echo "Pulling $${EMAIL_AI_MODEL}..."
        tries=0
        until ollama pull "$${EMAIL_AI_MODEL}"; do
          tries=$$((tries+1))
          if [ "$$tries" -ge 5 ]; then echo "Model pull failed after 5 attempts."; exit 1; fi
          echo "Ollama not ready yet — retrying in 5s..."
          sleep 5
        done
    depends_on:
      - ollama
    networks:
      - internal
    restart: "no"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: planner
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups:ro   # so restore is a one-liner inside this container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    # No host ports — internal network only.

  # Nightly Postgres backups → ./backups on the host (compressed pg_dump format).
  # Dumps once at startup, then every 24 h; prunes dumps older than
  # BACKUP_KEEP_DAYS. Restore (into the running db):
  #   docker compose exec db pg_restore -U planner -d planner --clean --if-exists --no-owner /backups/<file>.dump
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if pg_dump -Fc -h db -U planner planner > "/backups/planner-$$ts.dump.part"; then
            mv "/backups/planner-$$ts.dump.part" "/backups/planner-$$ts.dump"
            echo "backup: wrote planner-$$ts.dump"
          else
            rm -f "/backups/planner-$$ts.dump.part"
            echo "backup: pg_dump FAILED (will retry next cycle)"
          fi
          find /backups -name 'planner-*.dump' -mtime +$${BACKUP_KEEP_DAYS} -delete
          sleep 86400
        done
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  db_data:
  uploads:
  ollama_models:
  caddy_data:
  caddy_config:

networks:
  web:
  internal:
